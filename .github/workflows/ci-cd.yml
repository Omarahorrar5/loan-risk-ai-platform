name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #JOB 1 — Run tests
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd ml
          pip install fastapi uvicorn sqlalchemy psycopg2-binary \
                      pytest httpx pydantic scikit-learn joblib numpy

      - name: Run tests
        run: |
          cd ml
          pytest tests/ -v --tb=short

  #JOB 2 — Build and push Docker images
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test                         
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/loan-risk-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/loan-risk-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/loan-risk-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/loan-risk-frontend:${{ github.sha }}

  #JOB 3 — Summary
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests        | ${{ needs.test.result }}           |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA   | ${{ github.sha }}                  |" >> $GITHUB_STEP_SUMMARY