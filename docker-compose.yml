services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     loanuser
      POSTGRES_PASSWORD: loanpass
      POSTGRES_DB:       loandb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loanuser -d loandb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: omarahorrar/loan-risk-backend:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://loanuser:loanpass@db:5432/loandb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    image: omarahorrar/loan-risk-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    command: >
      mlflow server 
      --backend-store-uri postgresql://loanuser:loanpass@db:5432/loandb
      --artifacts-destination /app/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  pgdata:
  mlflow_artifacts:

networks:
  app-net:
    driver: bridge